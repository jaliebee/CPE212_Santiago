---
- name: Install Mariadb Package (CentOS)
  yum:
    name: mariadb-server
    state: latest
  when: ansible_distribution == "CentOS"

- name: Restart and Enable MariaDB
  service:
    name: mariadb
    state: restarted
    enabled: true

- name: Install Mariadb Package (Ubuntu)
  apt:
    name: mariadb-server
    state: latest
  when: ansible_distribution == "Ubuntu"

- name: Restart and Enable MariaDB
  service:
    name: mariadb
    state: restarted
    enabled: true