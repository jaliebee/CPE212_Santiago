- name: Install and Start Pre-Requisites on CentOS
  yum:
    name: 
      - httpd
      - php
    state: present
    update_cache: yes
  when: ansible_distribution == "CentOS"

- name: Start Apache on CentOS
  service:
    name: httpd
    state: started
    enabled: yes
  when: ansible_distribution == "Ubuntu"
