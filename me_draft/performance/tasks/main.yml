- name: Install Prometheus
  apt:
    name: prometheus
    state: present
    update_cache: yes

- name: Install InfluxDB
  apt:
    name: influxdb
    state: present

- name: Add Grafana GPG key
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Add Grafana repository
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present
    filename: grafana

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Grafana
  apt:
    name: grafana
    state: present

- name: Enable and start Prometheus
  systemd:
    name: prometheus
    enabled: yes
    state: started

- name: Enable and start InfluxDB
  systemd:
    name: influxdb
    enabled: yes
    state: started

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started