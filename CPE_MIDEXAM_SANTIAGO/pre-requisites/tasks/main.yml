---
- name: Install Pre-requisites in Ubuntu
  apt:
    name:
      - apt-transport-https
      - openjdk-11-jdk
      - wget
      - curl
      - gnupg
      - software-properties-common
    state: present
    update_cache: yes
  when: ansible_distribution == "Ubuntu"

- name: Install Pre-requisites in CentOS
  dnf:
    name:
      - java-11-openjdk-devel
      - wget
      - curl
      - gnupg2
    state: present
    update_cache: yes
  when: ansible_distribution == "CentOS"